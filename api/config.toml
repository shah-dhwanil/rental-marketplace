# -----------------------------------------------------------------------------
# Global application settings (Config)
# -----------------------------------------------------------------------------
app_name = "Rental Marketplace"
app_version = "0.1.0"
debug = false
environment = "DEV"

# -----------------------------------------------------------------------------
# Server settings (ServerConfig)
# -----------------------------------------------------------------------------
[server]
host = "127.0.0.1"
port = 8000
workers = 1
reload = false

cors_enabled = true
cors_origins = "*"
cors_allow_credentials = true
cors_allow_methods = "*"
cors_allow_headers = "*"

max_request_size = 10485760
request_timeout = 60

rate_limit_enabled = false
rate_limit_per_minute = 60

# -----------------------------------------------------------------------------
# PostgreSQL database settings (DatabaseConfig)
# -----------------------------------------------------------------------------
[postgres]
pool_min_size = 1
pool_max_size = 2
pool_max_inactive_connection_lifetime = 300.0
pool_timeout = 10.0

# -----------------------------------------------------------------------------
# Cloudinary media storage settings (CloudinaryConfig)
# -----------------------------------------------------------------------------
[cloudinary]
cloud_name = ""
api_key = ""
api_secret = ""
